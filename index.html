<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#cb6d4f">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<title>ClawBridge</title>
<style>
  :root {
    --bg:        #14161a;
    --bg-2:      #1b1e24;
    --bg-3:      #232830;
    --line:      #2c313b;
    --text:      #e9ecf1;
    --muted:     #9aa3b2;
    --accent:    #cb6d4f;
    --accent-2:  #e08a6b;
    --user:      #2a4d6e;
    --ok:        #4caf6a;
    --err:       #e5595b;
    --radius:    16px;
    --safe-b:    env(safe-area-inset-bottom, 0px);
    --safe-t:    env(safe-area-inset-top, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Arabic', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    max-width: 720px;
    margin: 0 auto;
    position: relative;
  }

  /* ─── Header ─── */
  header {
    display: flex; align-items: center; gap: 10px;
    padding: calc(10px + var(--safe-t)) 14px 10px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    z-index: 20;
  }
  header .logo { width: 30px; height: 30px; border-radius: 8px; flex-shrink:0; }
  header .title { font-size: 17px; font-weight: 700; letter-spacing:.2px; }
  header .status { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
  header .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); }
  header .dot.on  { background: var(--ok); box-shadow:0 0 6px var(--ok); }
  header .dot.off { background: var(--err); }
  header .spacer { flex: 1; }
  .icon-btn {
    width: 40px; height: 40px; border:none; border-radius: 12px;
    background: var(--bg-3); color: var(--text); font-size: 19px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition: background .15s, transform .1s;
  }
  .icon-btn:active { transform: scale(.92); background: var(--line); }

  /* ─── Chat area ─── */
  main {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 16px 12px 8px;
    display: flex; flex-direction: column; gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .empty {
    margin: auto; text-align: center; color: var(--muted);
    display:flex; flex-direction:column; align-items:center; gap:14px; padding:24px;
  }
  .empty img { width: 76px; height:76px; opacity:.9; }
  .empty h2 { color: var(--text); font-size: 18px; font-weight:700; }
  .empty p { font-size: 13.5px; line-height: 1.7; max-width: 300px; }
  .empty .cta { color: var(--accent-2); font-weight:600; }

  .msg { max-width: 88%; padding: 10px 13px; border-radius: var(--radius); font-size: 14.5px; line-height:1.6; word-wrap:break-word; white-space:pre-wrap; }
  .msg.user   { align-self: flex-start; background: var(--user); border-bottom-right-radius: 5px; }
  .msg.bot    { align-self: flex-end; background: var(--bg-2); border:1px solid var(--line); border-bottom-left-radius:5px; font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size:13px; overflow-x:auto; }
  .msg.sys    { align-self: center; background: transparent; color: var(--muted); font-size:12px; text-align:center; padding:4px 10px; border:1px dashed var(--line); border-radius:10px; }
  .msg.err    { align-self: center; background: rgba(229,89,91,.12); color:#ffb3b4; font-size:12.5px; border:1px solid rgba(229,89,91,.3); }

  /* ─── Composer ─── */
  .composer {
    flex-shrink: 0;
    padding: 8px 10px calc(8px + var(--safe-b));
    background: var(--bg-2);
    border-top: 1px solid var(--line);
  }
  .attach-chip {
    display:none; align-items:center; gap:8px;
    background: var(--bg-3); border:1px solid var(--line); border-radius:10px;
    padding:7px 10px; margin-bottom:8px; font-size:12.5px; color:var(--text);
  }
  .attach-chip.show { display:flex; }
  .attach-chip .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .attach-chip .bar { height:3px; background:var(--line); border-radius:3px; flex-basis:60px; overflow:hidden; }
  .attach-chip .bar > i { display:block; height:100%; width:0; background:var(--accent); transition:width .2s; }
  .attach-chip .x { color:var(--muted); font-size:16px; cursor:pointer; padding:0 2px; }

  .input-row { display:flex; align-items:flex-end; gap:8px; }
  .input-row textarea {
    flex:1; resize:none; border:none; outline:none;
    background: var(--bg-3); color: var(--text);
    border-radius: 20px; padding: 11px 15px; font-size:15px; line-height:1.4;
    max-height: 130px; min-height: 44px; font-family:inherit;
  }
  .input-row textarea::placeholder { color: var(--muted); }
  .round-btn {
    width:44px; height:44px; border:none; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition: transform .12s, opacity .15s, background .15s;
  }
  .round-btn:active { transform: scale(.9); }
  .attach-btn { background: var(--bg-3); color: var(--muted); font-size:20px; }
  .send-btn   { background: var(--accent); color:#fff; font-size:20px;
                transform: scale(.4); opacity:0; width:0; pointer-events:none; }
  .composer.active .send-btn { transform: scale(1); opacity:1; width:44px; pointer-events:auto; }

  /* ─── Settings sheet ─── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    opacity:0; pointer-events:none; transition:opacity .2s; z-index:50;
  }
  .overlay.show { opacity:1; pointer-events:auto; }
  .sheet {
    position: fixed; left:0; right:0; bottom:0; z-index:60;
    background: var(--bg-2); border-top-left-radius:22px; border-top-right-radius:22px;
    border-top:1px solid var(--line);
    padding: 8px 18px calc(22px + var(--safe-b));
    max-width:720px; margin:0 auto;
    transform: translateY(110%); transition: transform .28s cubic-bezier(.2,.8,.2,1);
    max-height: 88dvh; overflow-y:auto;
  }
  .sheet.show { transform: translateY(0); }
  .sheet .grip { width:40px; height:4px; background:var(--line); border-radius:3px; margin:8px auto 16px; }
  .sheet h3 { font-size:16px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .field { margin-bottom:15px; }
  .field label { display:block; font-size:12.5px; color:var(--muted); margin-bottom:6px; }
  .field input, .field select {
    width:100%; background: var(--bg-3); border:1px solid var(--line); color:var(--text);
    border-radius:12px; padding:12px 14px; font-size:14.5px; outline:none; font-family:inherit;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field .pw-wrap { position:relative; }
  .field .pw-wrap input { padding-left:44px; }
  .field .pw-wrap .eye { position:absolute; left:8px; top:50%; transform:translateY(-50%);
                         background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:6px; }
  .btn {
    width:100%; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:600;
    cursor:pointer; font-family:inherit; transition:transform .1s, filter .15s;
  }
  .btn:active { transform: scale(.98); }
  .btn.primary { background: var(--accent); color:#fff; }
  .btn.ghost { background: var(--bg-3); color:var(--text); border:1px solid var(--line); }
  .btn:disabled { opacity:.55; cursor:default; }
  .row-gap { margin-bottom:12px; }
  .hint { font-size:12px; color:var(--muted); line-height:1.7; margin-top:4px; }
  .hint.ok  { color: var(--ok); }
  .hint.err { color: #ffb3b4; }
  .models-count { font-size:11.5px; color:var(--accent-2); margin-top:6px; }
</style>
</head>
<body>

  <header>
    <img class="logo" src="/logo.png" alt="">
    <div>
      <div class="title">ClawBridge</div>
      <div class="status"><span class="dot" id="dot"></span><span id="statusText">جارٍ الاتصال…</span></div>
    </div>
    <div class="spacer"></div>
    <button class="icon-btn" id="newBtn" title="جلسة جديدة">＋</button>
    <button class="icon-btn" id="setBtn" title="الإعدادات">⚙</button>
  </header>

  <main id="chat">
    <div class="empty" id="empty">
      <img src="/logo.png" alt="">
      <h2>ابدأ محادثة جديدة</h2>
      <p id="emptyHint">اضغط <span class="cta">＋</span> لبدء جلسة، أو اكتب رسالتك في الأسفل.</p>
    </div>
  </main>

  <div class="composer" id="composer">
    <div class="attach-chip" id="chip">
      <span>📎</span>
      <span class="name" id="chipName"></span>
      <span class="bar"><i id="chipBar"></i></span>
      <span class="x" id="chipX">✕</span>
    </div>
    <div class="input-row">
      <button class="round-btn attach-btn" id="attachBtn" title="رفع ملف">📎</button>
      <textarea id="input" rows="1" placeholder="اكتب رسالتك…"></textarea>
      <button class="round-btn send-btn" id="sendBtn" title="إرسال">➤</button>
    </div>
    <input type="file" id="file" hidden>
  </div>

  <!-- Settings -->
  <div class="overlay" id="overlay"></div>
  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <h3>⚙ الإعدادات</h3>

    <div class="field">
      <label>عنوان المنصة (Base URL)</label>
      <input id="baseUrl" type="url" inputmode="url" placeholder="https://api.anthropic.com  (اتركه فارغاً لـ Anthropic)">
    </div>

    <div class="field">
      <label>مفتاح API</label>
      <div class="pw-wrap">
        <input id="apiKey" type="password" placeholder="sk-...">
        <button class="eye" id="eye" type="button">👁</button>
      </div>
    </div>

    <button class="btn ghost row-gap" id="fetchModels">🔍 جلب النماذج المتوفرة</button>
    <div class="models-count" id="modelsCount"></div>

    <div class="field">
      <label>النموذج (Model)</label>
      <select id="model"><option value="">— اختر بعد جلب النماذج —</option></select>
    </div>

    <button class="btn primary" id="saveBtn">حفظ</button>
    <div class="hint" id="setHint">يُحفظ المفتاح والمنصة على هذا الجهاز فقط.</div>
  </div>

<script>
const API = '';
let currentSessionId = null;
let es = null;
let attached = null; // {path,name}

const $ = id => document.getElementById(id);
const chat = $('chat'), empty = $('empty'), composer = $('composer'), input = $('input');

// ── helpers ──
const stripAnsi = s => s.replace(/\x1b\[[0-9;?]*[A-Za-z]/g, '').replace(/\x1b\][^\x07]*\x07/g,'');
function scrollDown(){ chat.scrollTop = chat.scrollHeight; }
function hideEmpty(){ if(empty) empty.style.display='none'; }

function addMsg(text, cls){
  hideEmpty();
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  chat.appendChild(d);
  scrollDown();
  return d;
}
let botBuf = null;
function addBotChunk(text){
  hideEmpty();
  if(!botBuf){ botBuf = document.createElement('div'); botBuf.className='msg bot'; chat.appendChild(botBuf); }
  botBuf.textContent += text;
  scrollDown();
}
function endBot(){ botBuf = null; }

// ── config persistence ──
function loadCfg(){
  try { return JSON.parse(localStorage.getItem('clawbridge_cfg')||'{}'); } catch(e){ return {}; }
}
function saveCfgLocal(c){ localStorage.setItem('clawbridge_cfg', JSON.stringify(c)); }

// ── status ──
async function refreshStatus(){
  try {
    const r = await fetch(API+'/status'); const j = await r.json();
    $('dot').className = 'dot on';
    $('statusText').textContent = j.api_key_set ? 'جاهز' : 'المفتاح غير مضبوط';
    if(!j.api_key_set){ $('emptyHint').innerHTML = 'اضبط <span class="cta">مفتاح API</span> من ⚙ الإعدادات لبدء المحادثة.'; }
  } catch(e){
    $('dot').className = 'dot off';
    $('statusText').textContent = 'غير متصل';
  }
}

// ── session ──
async function ensureSession(){
  if(currentSessionId) return currentSessionId;
  const cfg = loadCfg();
  const r = await fetch(API+'/session/new', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(cfg)
  });
  const j = await r.json();
  if(!j.ok){ addMsg(j.error || 'تعذّر بدء الجلسة', 'err'); return null; }
  currentSessionId = j.session_id;
  openStream(currentSessionId);
  addMsg('— بدأت جلسة جديدة —', 'sys');
  return currentSessionId;
}
function openStream(id){
  if(es) es.close();
  es = new EventSource(API+'/session/'+id+'/stream');
  es.onmessage = ev => {
    let e; try { e = JSON.parse(ev.data); } catch(_) { return; }
    const txt = stripAnsi(e.data || '');
    if(e.type === 'stdout' || e.type === 'stderr'){ addBotChunk(txt); }
    else if(e.type === 'system'){ endBot(); addMsg(txt.trim(), 'sys'); }
  };
  es.onerror = () => { $('dot').className='dot off'; $('statusText').textContent='انقطع البث'; };
}
function newSession(){
  if(es) es.close();
  currentSessionId = null; endBot();
  chat.querySelectorAll('.msg').forEach(m=>m.remove());
  empty.style.display='';
  ensureSession();
}

// ── send ──
async function send(){
  let text = input.value.trim();
  if(!text && !attached) return;
  if(attached){
    text = (text ? text + '\n' : '') + 'الملف المرفق موجود على المسار: ' + attached.path;
  }
  const sid = await ensureSession();
  if(!sid) return;
  addMsg(input.value.trim() + (attached ? '\n📎 '+attached.name : ''), 'user');
  input.value=''; autoGrow(); clearAttach();
  updateSendBtn();
  try {
    await fetch(API+'/session/'+sid+'/input', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text })
    });
  } catch(e){ addMsg('فشل الإرسال: '+e.message, 'err'); }
}

// ── upload (up to 300MB, any type) ──
function pickFile(){ $('file').click(); }
$('file').addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  if(f.size > 300*1024*1024){ addMsg('الملف أكبر من 300MB', 'err'); e.target.value=''; return; }
  uploadFile(f);
  e.target.value='';
});
function uploadFile(f){
  attached = null;
  $('chip').classList.add('show');
  $('chipName').textContent = f.name + ' (' + fmtSize(f.size) + ')';
  $('chipBar').style.width = '0%';
  updateSendBtn();
  const xhr = new XMLHttpRequest();
  xhr.open('POST', API+'/upload?name='+encodeURIComponent(f.name));
  xhr.upload.onprogress = ev => {
    if(ev.lengthComputable) $('chipBar').style.width = Math.round(ev.loaded/ev.total*100)+'%';
  };
  xhr.onload = () => {
    try {
      const j = JSON.parse(xhr.responseText);
      if(j.ok){ attached = {path:j.path, name:j.name}; $('chipBar').style.width='100%'; }
      else { addMsg(j.error||'فشل الرفع','err'); clearAttach(); }
    } catch(_){ addMsg('فشل الرفع','err'); clearAttach(); }
    updateSendBtn();
  };
  xhr.onerror = () => { addMsg('فشل الرفع — تحقق من الاتصال','err'); clearAttach(); };
  xhr.send(f);
}
function clearAttach(){ attached=null; $('chip').classList.remove('show'); updateSendBtn(); }
function fmtSize(b){ if(b<1024) return b+'B'; if(b<1048576) return (b/1024).toFixed(0)+'KB'; return (b/1048576).toFixed(1)+'MB'; }

// ── models discovery ──
async function fetchModels(){
  const baseUrl = $('baseUrl').value.trim();
  const apiKey  = $('apiKey').value.trim();
  if(!apiKey){ setHint('أدخل المفتاح أولاً', 'err'); return; }
  const btn = $('fetchModels'); btn.disabled = true; const old = btn.textContent;
  btn.textContent = '… جارٍ الجلب';
  $('modelsCount').textContent = '';
  try {
    const r = await fetch(API+'/models', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ baseUrl, apiKey })
    });
    const j = await r.json();
    if(j.ok && j.models.length){
      const sel = $('model'); sel.innerHTML='';
      j.models.forEach(m => { const o=document.createElement('option'); o.value=m; o.textContent=m; sel.appendChild(o); });
      $('modelsCount').textContent = '✓ تم العثور على '+j.models.length+' نموذج';
      const saved = loadCfg().model; if(saved && j.models.includes(saved)) sel.value = saved;
    } else {
      setHint(j.error || 'لم يتم العثور على نماذج', 'err');
    }
  } catch(e){ setHint('تعذّر الاتصال بالمنصة', 'err'); }
  btn.disabled=false; btn.textContent = old;
}

// ── settings sheet ──
function openSheet(){
  const c = loadCfg();
  $('baseUrl').value = c.baseUrl||''; $('apiKey').value = c.apiKey||'';
  if(c.model){ const s=$('model'); if(![...s.options].some(o=>o.value===c.model)){ const o=document.createElement('option'); o.value=c.model;o.textContent=c.model;s.appendChild(o);} s.value=c.model; }
  $('overlay').classList.add('show'); $('sheet').classList.add('show');
}
function closeSheet(){ $('overlay').classList.remove('show'); $('sheet').classList.remove('show'); }
function setHint(t, cls){ const h=$('setHint'); h.textContent=t; h.className='hint '+(cls||''); }

async function saveCfg(){
  const cfg = { baseUrl:$('baseUrl').value.trim(), apiKey:$('apiKey').value.trim(), model:$('model').value };
  saveCfgLocal(cfg);
  try {
    await fetch(API+'/config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(cfg) });
    setHint('✓ تم الحفظ', 'ok');
    refreshStatus();
    setTimeout(closeSheet, 500);
  } catch(e){ setHint('تعذّر الحفظ على الخادم', 'err'); }
}

// ── input UX ──
function autoGrow(){ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,130)+'px'; }
function updateSendBtn(){ composer.classList.toggle('active', !!input.value.trim() || !!attached); }
input.addEventListener('input', ()=>{ autoGrow(); updateSendBtn(); });
input.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });

// ── wire up ──
$('sendBtn').onclick = send;
$('attachBtn').onclick = pickFile;
$('chipX').onclick = clearAttach;
$('newBtn').onclick = newSession;
$('setBtn').onclick = openSheet;
$('overlay').onclick = closeSheet;
$('fetchModels').onclick = fetchModels;
$('saveBtn').onclick = saveCfg;
$('eye').onclick = () => { const i=$('apiKey'); i.type = i.type==='password'?'text':'password'; };

refreshStatus();
setInterval(refreshStatus, 15000);
</script>
</body>
</html>
